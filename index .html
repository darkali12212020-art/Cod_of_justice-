<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justice v3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

html, body{
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
}

/* background */
.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at center,#2a0000 0%,#000 75%);
animation:breath 7s ease-in-out infinite;
z-index:0;
}

@keyframes breath{
0%{filter:brightness(1);}
50%{filter:brightness(1.6);}
100%{filter:brightness(1);}
}

/* particles */
.particle{
position:fixed;
width:2px;
height:2px;
background:red;
border-radius:50%;
opacity:0.5;
box-shadow:0 0 8px red;
animation:float linear infinite;
pointer-events:none;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* container */
.container{
position:relative;
z-index:2;
text-align:center;
animation:enter 1.2s ease;
}

@keyframes enter{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

/* scale */
.scale{
font-size:45px;
animation:swing 5s ease-in-out infinite;
filter:drop-shadow(0 0 12px red);
}

@keyframes swing{
0%{transform:rotate(-4deg);}
50%{transform:rotate(4deg);}
100%{transform:rotate(-4deg);}
}

/* title */
h1{
font-size:60px;
margin:10px 0;
letter-spacing:1px;
}

.cod{
color:white;
text-shadow:0 0 20px white;
}

.justice{
color:#ff2b2b;
text-shadow:0 0 25px red;
}

/* line */
.line{
width:180px;
height:2px;
background:red;
margin:0 auto 15px;
box-shadow:0 0 15px red;
}

/* subtitle */
.subtitle{
color:#bbb;
font-size:13px;
margin-bottom:20px;
}

/* card */
.card{
background:rgba(255,0,0,0.04);
border:1px solid rgba(255,80,80,0.35);
padding:28px;
border-radius:20px;
backdrop-filter:blur(14px);
box-shadow:0 0 60px rgba(255,0,0,0.12);
}

/* status */
.status{
font-size:13px;
opacity:0.85;
margin-bottom:15px;
}

/* countdown */
.countdown{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

/* boxes */
.box{
width:100px;
height:100px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,80,80,0.4);
transition:0.25s;
}

.box:hover{
transform:scale(1.08);
box-shadow:0 0 30px red;
}

/* number */
.num{
font-size:32px;
font-weight:bold;
color:#ff3b3b;
text-shadow:0 0 15px red;
min-width:40px;
transition:0.2s;
}

/* animation pop */
.num.pop{
transform:scale(1.2);
color:white;
text-shadow:0 0 25px red;
}

/* label */
.label{
font-size:12px;
color:#ccc;
}

/* responsive */
@media(max-width:500px){
h1{font-size:40px;}
.box{width:78px;height:78px;}
.scale{font-size:32px;}
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="scale">⚖️</div>

<h1>
<span class="cod">Cod</span>
<span class="justice"> Justice</span>
</h1>

<div class="line"></div>

<div class="subtitle">Coming Soon - Official Website</div>

<div class="card">

<div class="status">🚧 سایت در حال توسعه است</div>

<div class="countdown">

<div class="box"><div class="num" id="days">0</div><div class="label">روز</div></div>
<div class="box"><div class="num" id="hours">0</div><div class="label">ساعت</div></div>
<div class="box"><div class="num" id="minutes">0</div><div class="label">دقیقه</div></div>
<div class="box"><div class="num" id="seconds">0</div><div class="label">ثانیه</div></div>

</div>

</div>

</div>

<script>

/* countdown */
const launchDate = new Date("2026-12-01 00:00:00").getTime();

function animate(el){
el.classList.add("pop");
setTimeout(()=>el.classList.remove("pop"),200);
}

function update(){

let now = new Date().getTime();
let d = Math.max(0, launchDate - now);

let days = Math.floor(d/86400000);
let hours = Math.floor((d%86400000)/3600000);
let minutes = Math.floor((d%3600000)/60000);
let seconds = Math.floor((d%60000)/1000);

let dEl = document.getElementById("days");
let hEl = document.getElementById("hours");
let mEl = document.getElementById("minutes");
let sEl = document.getElementById("seconds");

if(dEl.innerText != days) animate(dEl);
if(hEl.innerText != hours) animate(hEl);
if(mEl.innerText != minutes) animate(mEl);
if(sEl.innerText != seconds) animate(sEl);

dEl.innerText = days;
hEl.innerText = hours;
mEl.innerText = minutes;
sEl.innerText = seconds;

}

setInterval(update,1000);
update();

/* particles safe */
for(let i=0;i<60;i++){
let p = document.createElement("span");
p.className = "particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (Math.random()*6+5) + "s";
document.body.appendChild(p);
}

</script>

</body>
</html>
